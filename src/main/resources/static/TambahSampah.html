<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxbin - Input Setoran Sampah (Pegawai)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #334155;
        }
        .navbar-flux {
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 30px;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-svg-container {
            width: 32px;
            height: 35px;
            background-color: #00a86b;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
        }
        .logo-svg {
            width: 100%;
            height: 100%;
            fill: #ffffff;
        }
        .logo-text {
            font-weight: 800;
            font-size: 1.5rem;
            color: #0f172a;
            letter-spacing: 0.5px;
            margin: 0;
            text-transform: uppercase;
        }
        .logo-highlight {
            color: #334155;
        }
        .btn-back {
            background-color: #00a86b;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-back:hover {
            background-color: #008754;
        }
        .flux-card {
            background: #ffffff;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            padding: 32px;
            max-width: 600px;
            margin: 30px auto;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }
        .form-label-custom {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            color: #64748b;
        }
        .form-control {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 16px;
            width: 100%;
            height: 60px;
        }
        .form-control:focus {
            border-color: #00a86b;
            box-shadow: 0 0 0 3px rgba(0, 168, 107, 0.1);
        }
        .btn-submit {
            background-color: #00a86b;
            color: white;
            font-weight: 700;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-submit:hover {
            background-color: #008754;
        }
        .info-pegawai {
            background-color: #f1f5f9;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .select2-search {
            position: relative;
        }
        .loading-data {
            text-align: center;
            padding: 20px;
            color: #94a3b8;
        }
        .selected-info {
            background-color: #00a86b10;
            border: 1px solid #00a86b20;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-flux justify-content-between align-items-center">
        <div class="logo-container">
            <div class="logo-svg-container">
                <svg class="logo-svg" viewBox="0 0 24 24">
                    <path d="M15.5 4l-1-1h-5l-1 1H5v2h14V4zM6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zm5-9h2v4h3l-4 4-4-4h3v-4z"/>
                </svg>
            </div>
            <div class="logo-text">Flux<span class="logo-highlight">bin</span></div>
        </div>
        <button class="btn-back" onclick="window.location.href='/Pegawai.html'">
            ← Kembali ke Dashboard
        </button>
    </nav>

    <div class="container">
        <div class="flux-card">
            <h3 class="text-center mb-4" style="color: #1e293b;">🗑️ Input Setoran Sampah</h3>
            <p class="text-muted text-center mb-4">Pilih warga dari daftar, lalu catat setoran sampahnya</p>
            
            <div class="info-pegawai text-center" id="info-pegawai">
                👷 <span id="nama-pegawai">Petugas</span> sedang bertugas
            </div>
            
            <form id="formTambahSampah">
                <div class="form-group mb-4">
                    <label class="form-label-custom">👨‍👩‍👧‍👦 Pilih Kepala Keluarga</label>
                    <select id="pilihKeluarga" class="form-control" required>
                        <option value="">-- Pilih Keluarga --</option>
                    </select>
                    <div id="selectedInfo" class="selected-info" style="display: none;">
                        <span>📋 </span><span id="selectedNoKK"></span>
                    </div>
                    <small class="text-muted">Pilih berdasarkan nama kepala keluarga</small>
                </div>
                
                <div class="form-group mb-4">
                    <label class="form-label-custom">🗑️ Jenis Sampah</label>
                    <select id="jenisSampah" class="form-control" required>
                        <option value="">-- Pilih Jenis Sampah --</option>
                        <option value="1">🌿 Sampah Organik</option>
                        <option value="2">♻️ Sampah Anorganik</option>
                        <option value="3">⚠️ Sampah B3</option>
                    </select>
                </div>
                
                <div class="form-group mb-4">
                    <label class="form-label-custom">⚖️ Jumlah (kg)</label>
                    <input type="number" id="jumlahMasuk" step="0.1" min="0" class="form-control" placeholder="Contoh: 2.5" required>
                </div>
                
                <button type="submit" class="btn-submit">
                    💾 Simpan Setoran
                </button>
            </form>
            
            <div class="text-center mt-4">
                <small class="text-muted">Setoran akan langsung tercatat di riwayat dan menambah poin Flux Points keluarga</small>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://tubes-prakpbo-production.up.railway.app/api';
        
        // Ambil data user dari localStorage
        const dataUser = JSON.parse(localStorage.getItem('userLoggedIn'));
        
        if (!dataUser) {
            alert('Silakan login terlebih dahulu!');
            window.location.href = '/index.html';
        }
        
        // Tampilkan nama pegawai
        const namaPegawai = dataUser.namaPegawai || dataUser.nama || 'Petugas';
        document.getElementById('nama-pegawai').innerText = namaPegawai;
        
        let daftarKeluarga = [];
        let selectedNoKK = '';
        
        // ========== AMBIL DATA KELUARGA DARI DATABASE ==========
        async function loadKeluargaList() {
            const selectElement = document.getElementById('pilihKeluarga');
            selectElement.innerHTML = '<option value="">⏳ Memuat data keluarga...</option>';
            
            try {
                const response = await fetch('https://tubes-prakpbo-production.up.railway.app/api/keluarga');
                
                console.log('Response status:', response.status); // Debug: lihat status
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('Data keluarga:', data); // Debug: lihat data yang diterima
                
                daftarKeluarga = data;
                
                if (!daftarKeluarga || daftarKeluarga.length === 0) {
                    selectElement.innerHTML = '<option value="">❌ Belum ada keluarga terdaftar</option>';
                    return;
                }
                
                // Buat option dropdown
                let options = '<option value="">-- Pilih Keluarga --</option>';
                daftarKeluarga.forEach(keluarga => {
                    // Sesuaikan dengan field yang ada di database
                    const noKK = keluarga.noKk || keluarga.no_kk || keluarga.idUser;
                    const nama = keluarga.namaKepala || keluarga.nama_kepala || keluarga.namaUser || 'Tidak ada nama';
                    const alamat = keluarga.alamat ? ` - ${keluarga.alamat.substring(0, 30)}` : '';
                    options += `<option value="${noKK}" data-nama="${nama}">${nama} (${noKK})${alamat}</option>`;
                });
                
                selectElement.innerHTML = options;
                
            } catch (error) {
                console.error('Error detail:', error);
                selectElement.innerHTML = '<option value="">❌ Gagal memuat data keluarga</option>';
                alert('Gagal memuat data keluarga. Pastikan backend berjalan di https://tubes-prakpbo-production.up.railway.app\n\nError: ' + error.message);
            }
        }
        
        // ========== TAMPILKAN INFORMASI KELUARGA YANG DIPILIH ==========
        document.getElementById('pilihKeluarga').addEventListener('change', function() {
            const selectedOption = this.options[this.selectedIndex];
            const noKK = this.value;
            const nama = selectedOption.getAttribute('data-nama');
            
            if (noKK) {
                selectedNoKK = noKK;
                document.getElementById('selectedInfo').style.display = 'block';
                document.getElementById('selectedNoKK').innerHTML = `Mencatat untuk: <strong>${nama}</strong> (No. KK: ${noKK})`;
            } else {
                selectedNoKK = '';
                document.getElementById('selectedInfo').style.display = 'none';
            }
        });
        
        // ========== SUBMIT FORM ==========
        document.getElementById('formTambahSampah').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const noKK = document.getElementById('pilihKeluarga').value;
            const jenisSampahId = parseInt(document.getElementById('jenisSampah').value);
            const jumlahMasuk = parseFloat(document.getElementById('jumlahMasuk').value);
            
            if (!noKK) {
                alert('Silakan pilih keluarga terlebih dahulu!');
                return;
            }
            
            if (!jenisSampahId) {
                alert('Silakan pilih jenis sampah!');
                return;
            }
            
            if (!jumlahMasuk || jumlahMasuk <= 0) {
                alert('Silakan isi jumlah sampah dengan benar!');
                return;
            }
            
            // ✅ KIRIM HANYA ID (bukan object lengkap)
            const data = {
                jenisSampahId: jenisSampahId,
                jumlahMasuk: jumlahMasuk,
                noKk: noKK,
                tanggalMasuk: new Date().toISOString()
            };
            
            console.log('Data yang dikirim:', data); // Debug
            
            const submitBtn = document.querySelector('.btn-submit');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '⏳ Menyimpan...';
            submitBtn.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/sampah-masuk`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    alert('✅ Setoran sampah berhasil dicatat!');
                    document.getElementById('jenisSampah').value = '';
                    document.getElementById('jumlahMasuk').value = '';
                } else {
                    const error = await response.text();
                    alert('❌ Gagal menyimpan: ' + error);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('❌ Gagal terhubung ke server! Pastikan backend berjalan.');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
        
        // ========== LOAD DATA KELUARGA SAAT HALAMAN DIBUKA ==========
        loadKeluargaList();
    </script>
</body>
</html>
