<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxbin - Tambah Setoran Sampah</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #334155;
        }
        .navbar-flux {
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 30px;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-svg-container {
            width: 32px;
            height: 35px;
            background-color: #00a86b;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
        }
        .logo-svg {
            width: 100%;
            height: 100%;
            fill: #ffffff;
        }
        .logo-text {
            font-weight: 800;
            font-size: 1.5rem;
            color: #0f172a;
            letter-spacing: 0.5px;
            margin: 0;
            text-transform: uppercase;
        }
        .logo-highlight {
            color: #334155;
        }
        .btn-back {
            background-color: #00a86b;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-back:hover {
            background-color: #008754;
        }
        .flux-card {
            background: #ffffff;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            padding: 32px;
            max-width: 600px;
            margin: 30px auto;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }
        .form-label-custom {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            color: #64748b;
        }
        .form-control {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 16px;
        }
        .form-control:focus {
            border-color: #00a86b;
            box-shadow: 0 0 0 3px rgba(0, 168, 107, 0.1);
        }
        .btn-submit {
            background-color: #00a86b;
            color: white;
            font-weight: 700;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-submit:hover {
            background-color: #008754;
        }
        .info-keluarga {
            background-color: #f1f5f9;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-flux justify-content-between align-items-center">
        <div class="logo-container">
            <div class="logo-svg-container">
                <svg class="logo-svg" viewBox="0 0 24 24">
                    <path d="M15.5 4l-1-1h-5l-1 1H5v2h14V4zM6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zm5-9h2v4h3l-4 4-4-4h3v-4z"/>
                </svg>
            </div>
            <div class="logo-text">Flux<span class="logo-highlight">bin</span></div>
        </div>
        <button class="btn-back" onclick="window.location.href='keluarga.html'">
            ← Kembali ke Dashboard
        </button>
    </nav>

    <div class="container">
        <div class="flux-card">
            <h3 class="text-center mb-4" style="color: #1e293b;">🗑️ Catat Setoran Sampah</h3>
            <p class="text-muted text-center mb-4">Isi form di bawah untuk mencatat setoran sampah Anda</p>
            
            <div id="info-keluarga" class="info-keluarga text-center">
                ⏳ Memuat data keluarga...
            </div>
            
            <form id="formTambahSampah">
                <div class="form-group mb-4">
                    <label class="form-label-custom">📋 Jenis Sampah</label>
                    <select id="jenisSampah" class="form-control" required>
                        <option value="">-- Pilih Jenis Sampah --</option>
                        <option value="1">🌿 Sampah Organik</option>
                        <option value="2">♻️ Sampah Anorganik</option>
                        <option value="3">⚠️ Sampah B3</option>
                    </select>
                </div>
                
                <div class="form-group mb-4">
                    <label class="form-label-custom">⚖️ Jumlah (kg)</label>
                    <input type="number" id="jumlahMasuk" step="0.1" min="0" class="form-control" placeholder="Contoh: 2.5" required>
                </div>
                
                <button type="submit" class="btn-submit">
                    <i class="mr-2">📤</i> Simpan Setoran
                </button>
            </form>
            
            <div class="text-center mt-4">
                <small class="text-muted">Setoran akan langsung tercatat di riwayat Anda</small>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        
        // Ambil data user dari localStorage
        const dataUser = JSON.parse(localStorage.getItem('userLoggedIn'));
        
        if (!dataUser) {
            alert('Silakan login terlebih dahulu!');
            window.location.href = 'index.html';
        }
        
        // Tampilkan informasi keluarga
        const noKK = dataUser.noKK || dataUser.noKk;
        const namaKeluarga = dataUser.namaKepalaKeluarga || dataUser.namaUser || dataUser.nama || 'Keluarga';
        
        document.getElementById('info-keluarga').innerHTML = `
            <strong>👨‍👩‍👧‍👦 Keluarga ${namaKeluarga}</strong><br>
            No. KK: ${noKK}
        `;
        
        // Submit form
        document.getElementById('formTambahSampah').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const jenisSampahId = parseInt(document.getElementById('jenisSampah').value);
            const jumlahMasuk = parseFloat(document.getElementById('jumlahMasuk').value);
            
            if (!jenisSampahId || !jumlahMasuk || jumlahMasuk <= 0) {
                alert('Silakan isi semua data dengan benar!');
                return;
            }
            
            const data = {
                jenisSampah: { idJenis: jenisSampahId },
                jumlahMasuk: jumlahMasuk,
                noKk: noKK,
                tanggalMasuk: new Date().toISOString()
            };
            
            const submitBtn = document.querySelector('.btn-submit');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '⏳ Menyimpan...';
            submitBtn.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/sampah-masuk`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    alert('✅ Setoran sampah berhasil dicatat!');
                    document.getElementById('formTambahSampah').reset();
                } else {
                    const error = await response.text();
                    alert('❌ Gagal menyimpan: ' + error);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('❌ Gagal terhubung ke server! Pastikan backend berjalan.');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
