<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxbin - Riwayat Setoran Sampah</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .navbar-flux { background: white; border-bottom: 1px solid #e2e8f0; padding: 12px 30px; }
        .logo-text { font-weight: 800; font-size: 1.6rem; color: #00a86b; }
        .logo-highlight { color: #1e293b; }
        .flux-card { background: white; border-radius: 16px; border: 1px solid #e2e8f0; padding: 24px; margin-bottom: 20px; }
        .table-flux thead th { background: #f1f5f9; font-size: 0.75rem; text-transform: uppercase; padding: 14px; }
        .table-flux tbody td { padding: 14px; font-size: 0.85rem; vertical-align: middle; }
        .btn-back { background: #00a86b; color: white; border: none; padding: 8px 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-flux d-flex justify-content-between">
        <div class="logo-container"><div class="logo-text">FLUX<span class="logo-highlight">BIN</span></div></div>
        <a href="/keluarga.html" class="btn-back">← Kembali ke Dashboard</a>
    </nav>
    <div class="container py-4">
        <div class="flux-card">
            <h4 class="font-weight-bold mb-3">📋 Riwayat Setoran Sampah</h4>
            <p class="text-muted small mb-4" id="info-keluarga">Memuat data keluarga...</p>
            <div class="table-responsive">
                <table class="table table-flux">
                    <thead><tr><th>Tanggal</th><th>Jenis Sampah</th><th>Jumlah (kg)</th><th>Status</th></tr></thead>
                    <tbody id="history-table"></tbody>
                </table>
            </div>
            <div class="mt-3"><canvas id="history-chart" height="150"></canvas></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('userLoggedIn')) || { noKK: '3273000000000000', namaKepalaKeluarga: 'Keluarga Contoh' };
        document.getElementById('info-keluarga').innerText = `Keluarga: ${user.namaKepalaKeluarga} (No. KK: ${user.noKK})`;
        
        // Data simulasi (nanti ganti dengan fetch dari API)
        const dataSetoran = [
            { tgl: '2026-05-01', jenis: 'Organik', jumlah: 5.2, status: 'Terverifikasi' },
            { tgl: '2026-05-08', jenis: 'Anorganik', jumlah: 3.5, status: 'Terverifikasi' },
            { tgl: '2026-05-15', jenis: 'Organik', jumlah: 4.8, status: 'Terverifikasi' },
            { tgl: '2026-05-22', jenis: 'B3', jumlah: 1.2, status: 'Menunggu' }
        ];
        
        document.getElementById('history-table').innerHTML = dataSetoran.map(s => `<tr><td>${s.tgl}</td><td>${s.jenis}</td><td>${s.jumlah} kg</td><td>${s.status === 'Terverifikasi' ? '<span class="text-success">✓ Terverifikasi</span>' : '<span class="text-warning">⏳ Menunggu</span>'}</td></tr>`).join('');
        
        new Chart(document.getElementById('history-chart'), {
            type: 'bar', data: { labels: dataSetoran.map(s => s.tgl), datasets: [{ label: 'Berat Sampah (kg)', data: dataSetoran.map(s => s.jumlah), backgroundColor: '#00a86b', borderRadius: 4 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } }
        });
    </script>
</body>
</html>
