<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxbin - Riwayat Setoran Sampah</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .navbar-flux { background: white; border-bottom: 1px solid #e2e8f0; padding: 12px 30px; }
        .logo-text { font-weight: 800; font-size: 1.6rem; color: #00a86b; }
        .logo-highlight { color: #1e293b; }
        .flux-card { background: white; border-radius: 16px; border: 1px solid #e2e8f0; padding: 24px; margin-bottom: 20px; }
        .table-flux thead th { background: #f1f5f9; font-size: 0.75rem; text-transform: uppercase; padding: 14px; }
        .table-flux tbody td { padding: 14px; font-size: 0.85rem; vertical-align: middle; }
        .btn-back { background: #00a86b; color: white; border: none; padding: 8px 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-flux d-flex justify-content-between">
        <div class="logo-container"><div class="logo-text">FLUX<span class="logo-highlight">BIN</span></div></div>
        <a href="/Keluarga.html" class="btn-back">← Kembali ke Dashboard</a>
    </nav>
    <div class="container py-4">
        <div class="flux-card">
            <h4 class="font-weight-bold mb-3">📋 Riwayat Setoran Sampah</h4>
            <p class="text-muted small mb-4" id="info-keluarga">Memuat data keluarga...</p>
            <div class="table-responsive">
                <table class="table table-flux">
                    <thead><tr><th>Tanggal</th><th>Jenis Sampah</th><th>Jumlah (kg)</th><th>Status</th></tr></thead>
                    <tbody id="history-table"></tbody>
                </table>
            </div>
            <div class="mt-3"><canvas id="history-chart" height="150"></canvas></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // ====================================================================
        // 1. CEK AUTENTIKASI (PROTEKSI HALAMAN)
        // ====================================================================
        let dataUser = null;
        try {
            dataUser = JSON.parse(localStorage.getItem('userLoggedIn'));
        } catch(e) {
            console.error('Error parsing user data:', e);
        }

        // Jika belum login atau bukan keluarga, tendang ke halaman login
        if (!dataUser || dataUser.role.toUpperCase() !== 'KELUARGA') {
            alert('Halaman ini hanya untuk Keluarga yang sudah login!');
            window.location.href = '/index.html';
        }

        // Ambil No KK dan Nama untuk header
        const noKK = dataUser.noKK || dataUser.noKk;
        const namaKeluarga = dataUser.namaKepalaKeluarga || dataUser.namaKepala || dataUser.nama || "Keluarga";
        document.getElementById('info-keluarga').innerText = `Keluarga: ${namaKeluarga} (No. KK: ${noKK})`;

        // ====================================================================
        // 2. AMBIL DATA RIWAYAT DARI DATABASE (API)
        // ====================================================================
        const API_BASE = 'https://tubes-prakpbo-production.up.railway.app/api';

        async function loadHistory() {
            const tableBody = document.getElementById('history-table');
            tableBody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">⏳ Sedang memuat riwayat...</td></tr>';

            try {
                const response = await fetch(`${API_BASE}/sampah-masuk/keluarga/${noKK}`);
                
                if (!response.ok) {
                    throw new Error('Gagal mengambil data riwayat');
                }

                const dataSetoran = await response.json();

                // Jika data kosong
                if (!dataSetoran || dataSetoran.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" class="text-center font-weight-bold text-muted">Belum ada riwayat setoran sampah.</td></tr>';
                    return;
                }

                // ====================================================================
                // 3. RENDER TABEL
                // ====================================================================
                tableBody.innerHTML = dataSetoran.map(s => {
                    // Sesuaikan nama field dengan model Java kamu
                    const tgl = s.tanggal || s.tanggalSetor || s.tanggalMasuk || '-';
                    const jenis = s.jenisSampah?.namaJenis || s.kategori || '-';
                    const jumlah = s.jumlahMasuk || s.berat || 0;
                    
                    // Simulasi status (bisa disesuaikan jika di database ada kolom status validasi)
                    const statusVal = s.status || 'Terverifikasi';
                    const badge = statusVal.toLowerCase().includes('tunggu') 
                        ? '<span class="text-warning font-weight-bold">⏳ Menunggu</span>' 
                        : '<span class="text-success font-weight-bold">✓ Terverifikasi</span>';

                    return `
                        <tr>
                            <td>${tgl}</td>
                            <td><span class="badge badge-light border px-2 py-1">${jenis}</span></td>
                            <td class="font-weight-bold text-secondary">${jumlah} kg</td>
                            <td>${badge}</td>
                        </tr>
                    `;
                }).join('');

                // ====================================================================
                // 4. RENDER GRAFIK RIWAYAT (Hanya 10 Setoran Terakhir agar tidak penuh)
                // ====================================================================
                // Ambil 10 data terakhir untuk grafik
                const dataGrafik = dataSetoran.slice(-10);
                
                const labels = dataGrafik.map(s => s.tanggal || s.tanggalSetor || s.tanggalMasuk || '?');
                const amounts = dataGrafik.map(s => s.jumlahMasuk || s.berat || 0);

                new Chart(document.getElementById('history-chart'), {
                    type: 'line', // Diubah jadi line chart agar lebih pas untuk tren waktu
                    data: { 
                        labels: labels, 
                        datasets: [{ 
                            label: 'Tren Berat Setoran (kg)', 
                            data: amounts, 
                            borderColor: '#00a86b',
                            backgroundColor: 'rgba(0, 168, 107, 0.1)',
                            borderWidth: 3,
                            pointBackgroundColor: '#00a86b',
                            pointRadius: 4,
                            fill: true,
                            tension: 0.3 // Bikin garisnya melengkung halus
                        }] 
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, // Ubah ke false agar bisa menyesuaikan tinggi container
                        plugins: { legend: { position: 'bottom' } },
                        scales: { y: { beginAtZero: true } }
                    }
                });

            } catch (error) {
                console.error('Error fetching history:', error);
                tableBody.innerHTML = '<tr><td colspan="4" class="text-center text-danger font-weight-bold">❌ Gagal terhubung ke server. Pastikan backend menyala.</td></tr>';
            }
        }

        // Jalankan fungsi saat halaman selesai dimuat
        loadHistory();
    </script>
</body>
</html>
