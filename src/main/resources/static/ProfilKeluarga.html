<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Fluxbin - Profil Keluarga</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>body{background:#f8fafc}.flux-card{background:white;border-radius:20px;padding:30px;max-width:600px;margin:50px auto}</style>
</head>
<body>
    <div class="flux-card"><h3 class="text-center mb-4">👤 Profil Keluarga</h3>
        <form id="formProfil"><div class="form-group"><label>No KK</label><input id="noKk" class="form-control" readonly></div>
        <div class="form-group"><label>Nama Kepala Keluarga</label><input id="nama" class="form-control"></div>
        <div class="form-group"><label>Alamat</label><input id="alamat" class="form-control"></div>
        <div class="form-group"><label>No Telepon</label><input id="noTelp" class="form-control"></div>
        <div class="form-group"><label>Email</label><input id="email" class="form-control"></div>
        <div class="form-group"><label>Password Baru</label><input id="password" type="password" class="form-control" placeholder="Kosongkan jika tidak diubah"></div>
        <button type="submit" class="btn btn-success btn-block">Simpan Perubahan</button></form>
        <div class="text-center mt-3"><a href="/Keluarga.html">← Kembali</a></div>
    </div>
    <script>
        // 1. Ambil data user yang sedang login
        const user = JSON.parse(localStorage.getItem('userLoggedIn'));
        
        // Jika belum login, tendang ke halaman login
        if (!user) {
            alert("Silakan login terlebih dahulu!");
            window.location.href = '/index.html';
        }

        // 2. Isi form dengan data yang ada di localStorage
        // Sesuaikan properti (seperti noKK, namaKepalaKeluarga) dengan format dari backend-mu
        const noKK = user.noKK || user.noKk;
        document.getElementById('noKk').value = noKK;
        document.getElementById('nama').value = user.namaKepalaKeluarga || user.namaKepala || user.nama || "";
        document.getElementById('alamat').value = user.alamatDomisili || user.alamat || "";
        document.getElementById('email').value = user.emailKontak || user.email || "";
        document.getElementById('noTelp').value = user.noTelp || user.telepon || "";

        // 3. Logika saat tombol "Simpan Perubahan" ditekan
        document.getElementById('formProfil').addEventListener('submit', async (e) => {
            e.preventDefault(); // Tahan halaman agar tidak auto-refresh
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = 'Menyimpan...';
            submitBtn.disabled = true;

            // Siapkan data baru yang diketik oleh pengguna
            const updatedData = {
                noKk: noKK,
                namaKepala: document.getElementById('nama').value,
                alamat: document.getElementById('alamat').value,
                email: document.getElementById('email').value,
                noTelp: document.getElementById('noTelp').value,
                // Hanya kirim password jika kolomnya diisi
                password: document.getElementById('password').value || undefined,
                role: "KELUARGA"
            };

            try {
                // Tembak API backend (Pastikan endpoint PUT ini sudah ada di Spring Boot kamu)
                const response = await fetch(`https://tubes-prakpbo-production.up.railway.app/api/keluarga/update/${noKK}`, {
                    method: 'PUT', // Menggunakan PUT untuk update data
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(updatedData)
                });

                const result = await response.json();

                if (result.success) {
                    alert('Profil berhasil diperbarui!');
                    
                    // Update localStorage dengan data yang baru agar dashboard ikut berubah
                    user.namaKepalaKeluarga = updatedData.namaKepala;
                    user.alamatDomisili = updatedData.alamat;
                    user.emailKontak = updatedData.email;
                    user.noTelp = updatedData.noTelp;
                    localStorage.setItem('userLoggedIn', JSON.stringify(user));
                    
                    // Kembali ke dashboard
                    window.location.href = '/Keluarga.html';
                } else {
                    alert('Gagal memperbarui profil: ' + result.message);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Gagal terhubung ke server. Pastikan backend berjalan.');
            } finally {
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
